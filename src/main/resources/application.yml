spring:
  application:
    name: gamarraloop-platform

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

# Google Cloud Vision API
google:
  cloud:
    vision:
      api-key: ${VISION_API_KEY:your-api-key-here}
      endpoint: https://vision.googleapis.com/v1/images:annotate
